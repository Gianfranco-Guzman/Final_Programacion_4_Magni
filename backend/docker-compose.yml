version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: foodstore_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodstore_dev_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-foodstore_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foodstore}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
