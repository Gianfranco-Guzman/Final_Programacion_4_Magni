# Alembic Configuration

[alembic]
sqlalchemy.url = driver://user:password@localhost/dbname
sqlalchemy.url = postgresql://foodstore:foodstore_dev_pass_123@localhost:5432/foodstore_db

target_metadata = None
script_location = alembic

version_path_separator = :

version_locations = %(here)s/alembic/versions

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
